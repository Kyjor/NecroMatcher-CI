name: Steam Deploy

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID that produced the NecroMatcher-Mac artifact'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: NecroMatcher-Mac
          path: NecroMatcher-Mac
          run-id: ${{ inputs.run_id }}

      - name: Display Artifact Contents
        run: ls -R NecroMatcher-Mac
  
